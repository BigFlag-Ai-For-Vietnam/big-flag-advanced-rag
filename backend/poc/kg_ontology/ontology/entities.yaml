entity_types:
  VanBan:
    description: Một văn bản pháp lý/quyết định cụ thể (Nghị định, Thông tư, Quyết định nội bộ)
    attributes:
    - so_hieu
    - loai
    - cap
    - ngay_ban_hanh
    - hieu_luc_tu
    - trang_thai
  KhaiNiem:
    description: Khái niệm/chủ đề tuân thủ dùng chung xuyên nhiều văn bản (vd Mật khẩu, MFA, Dữ liệu cá
      nhân, KYC)
