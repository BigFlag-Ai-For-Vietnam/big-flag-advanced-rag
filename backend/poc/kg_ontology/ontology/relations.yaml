relation_types:
  CAN_CU:
    description: Văn bản A lấy văn bản B làm căn cứ pháp lý / tuân thủ theo B
    keywords:
    - căn cứ
    - tuân thủ
    - phù hợp với
    - complies
    - based on
    - dựa trên
  THAM_CHIEU:
    description: Văn bản A dẫn chiếu tới văn bản B (không phải căn cứ pháp lý, không thay thế)
    keywords:
    - tham chiếu
    - dẫn chiếu
    - reference
    - refers to
    - theo quy định tại
  THAY_THE:
    description: Văn bản A thay thế văn bản B — CÓ THỂ chỉ thay thế MỘT PHẦN (kiểm tra kỹ phần nào vẫn
      giữ hiệu lực)
    keywords:
    - thay thế
    - supersede
    - replace
    - hết hiệu lực thi hành
    properties:
    - partial
    - giu_hieu_luc
  XUNG_DOT:
    description: Văn bản A và B quy định khác nhau cho CÙNG 1 khái niệm — có thể đã tuyên bố ưu tiên rõ
      ràng, có thể im lặng (cần cảnh báo), có thể là carve-out pháp luật chuyên ngành (KHÔNG phải xung
      đột thật, không báo động giả)
    keywords:
    - xung đột
    - mâu thuẫn
    - conflict
    - trái với
    - khác với
    properties:
    - loai
    - uu_tien_cho
  QUY_DINH:
    description: Văn bản quy định 1 giá trị/ngưỡng cụ thể
    keywords:
    - quy định
    - yêu cầu
    - phải có
    - tối thiểu
    - tối đa
  AP_DUNG_CHO:
    description: 1 giá trị/ngưỡng cụ thể áp dụng cho 1 khái niệm nào
    keywords:
    - áp dụng cho
    - applies to
    - của
    - đối với
