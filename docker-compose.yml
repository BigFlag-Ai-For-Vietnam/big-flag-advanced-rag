services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # override cho môi trường container (qdrant reachable qua service name)
      QDRANT_URL: http://qdrant:6333
      DB_URL: sqlite:////data/rag.db
      DATA_DIR: /data
    volumes:
      # bind mount: db + PDF gốc + ảnh page nằm trực tiếp trong ./backend/data trên host
      - ./backend/data:/data
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # FE gọi backend qua localhost của máy host (browser chạy ngoài container)
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
