services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Runtime storage = named volume (nhanh, tránh rủi ro mmap khi bind mount trên Windows).
      # Data đi theo git bằng SNAPSHOT (thư mục qdrant_snapshots/) — xem scripts/qdrant_*.
      - qdrant_data:/qdrant/storage
      # mount thư mục snapshot của repo vào container để tạo/khôi phục snapshot qua API
      - ./qdrant_snapshots:/qdrant/snapshots

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # override cho môi trường container (qdrant/retrieval-mcp reachable qua service name)
      QDRANT_URL: http://qdrant:6333
      DB_URL: sqlite:////data/rag.db
      DATA_DIR: /data
      RETRIEVAL_MCP_URL: http://retrieval-mcp:8100/mcp
    volumes:
      # bind mount: db + PDF gốc + ảnh page nằm trực tiếp trong ./backend/data trên host
      - ./backend/data:/data
    depends_on:
      - qdrant
      - retrieval-mcp

  retrieval-mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      # override cho môi trường container (qdrant reachable qua service name)
      QDRANT_URL: http://qdrant:6333
      # tool query_catalog đọc catalog document-level từ SQLite (read-only). Mount cùng
      # file DB với backend (backend ghi, mcp chỉ đọc) — xem volume ./backend/data bên dưới.
      DB_URL: sqlite:////data/rag.db
      DATA_DIR: /data
    volumes:
      - ./backend/data:/data
    depends_on:
      - qdrant

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # FE gọi backend qua localhost của máy host (browser chạy ngoài container)
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
