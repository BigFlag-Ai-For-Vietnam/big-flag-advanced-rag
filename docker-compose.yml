# App stack: backend + frontend.
# Qdrant (cùng MLflow/RustFS/Postgres) nằm ở stack infra/ — chạy `make infra-up-d`
# (hoặc `cd infra && docker compose up -d`) TRƯỚC, vì backend nối vào network
# "rag-infra" của stack đó để gọi qdrant/mlflow theo service name.

services:
  backend:
    build: ./backend
    # Publish API trực tiếp cho frontend local tại http://localhost:5173.
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # override cho môi trường container (qdrant/retrieval-mcp reachable qua service name)
      QDRANT_URL: http://qdrant:6333
      DB_URL: sqlite:////data/rag.db
      DATA_DIR: /data
      RETRIEVAL_MCP_URL: http://retrieval-mcp:8100/mcp
      MLFLOW_TRACKING_URI: http://mlflow:5000
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      # bind mount: db + PDF gốc + ảnh page nằm trực tiếp trong ./backend/data trên host
      - ./backend/data:/data
    depends_on:
      - retrieval-mcp
    networks:
      - default
      - infra

  retrieval-mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      # override cho môi trường container (qdrant/neo4j reachable qua service name) — BUG
      # đã fix: service này thiếu hẳn `networks:` dù set các URL này, nên trước đây KHÔNG
      # resolve được qdrant/neo4j theo service name (chỉ hoạt động "tình cờ" nếu Docker
      # default bridge network trùng tên, không đảm bảo) — xem CLAUDE.md "Graph boundary".
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      # tool query_catalog đọc catalog document-level từ SQLite (read-only). Mount cùng
      # file DB với backend (backend ghi, mcp chỉ đọc) — xem volume ./backend/data bên dưới.
      DB_URL: sqlite:////data/rag.db
      DATA_DIR: /data
    volumes:
      - ./backend/data:/data
    networks:
      - default
      - infra
  frontend:
    build: ./frontend
    # Publish Vite trực tiếp để có thể kiểm tra FE tại http://localhost:5173,
    # kể cả khi nginx local chưa khởi động được.
    ports:
      - "5173:5173"
    environment:
      # Khi truy cập Vite trực tiếp qua :5173, gọi backend đã publish trên host :8000.
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend
    networks:
      - default
      - infra

networks:
  # Network của stack infra/ (docker compose ở đó tạo ra); phải tồn tại trước khi up.
  infra:
    external: true
    name: rag-infra
