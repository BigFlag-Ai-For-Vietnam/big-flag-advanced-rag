# Bolt-over-TLS cho Neo4j Browser qua domain.
#
# Trang Browser phục vụ ở https://neo4j.big-rag.dev nên driver bolt của nó BẮT BUỘC dùng
# scheme mã hoá (neo4j+s:// / bolt+s://). Ở đây nginx chấm dứt TLS tại host:7687 bằng cert
# Let's Encrypt (SAN đã phủ neo4j.big-rag.dev) rồi forward bolt THUẦN xuống neo4j:7687
# trong mạng rag-infra. Neo4j community không tự bật SSL nên cách này là đơn giản nhất.
#
# - Backend/retrieval-mcp vẫn nối nội bộ bolt://neo4j:7687 (không đi qua block này).
# - neo4j service KHÔNG publish 7687 ra host nữa (nhường cổng cho nginx) — xem docker-compose.yml.
# - Discovery của Browser trả về server.bolt.advertised_address = neo4j.big-rag.dev:7687
#   nên driver routing (neo4j+s://) quay lại đúng qua domain.
server {
    listen 7687 ssl;

    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;

    # Resolve service name lúc kết nối (Docker DNS) để nginx start được kể cả khi neo4j
    # chưa sẵn sàng.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bolt_upstream neo4j:7687;
    proxy_pass $bolt_upstream;

    proxy_connect_timeout 10s;
    proxy_timeout 1h;   # bolt là kết nối dài; Browser giữ session mở.
}
