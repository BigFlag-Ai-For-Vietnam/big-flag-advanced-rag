# Cửa vào DUY NHẤT của app trên host: nginx 80/443 serve frontend + proxy /api về backend.
# Backend không publish :8000 ra host (xem ../docker-compose.yml của app).
#
# Cả frontend lẫn backend chạy ở stack app, nối vào network `rag-infra` — resolve service
# name lúc RUNTIME qua DNS nội bộ Docker (resolver + biến) để nginx vẫn start được khi
# stack app chưa up (infra up trước, theo thứ tự của `make up`).

# Chuẩn websocket: chỉ gửi "Connection: upgrade" khi client thật sự upgrade (HMR của Vite).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

# big-rag.dev là HSTS-preloaded (browser ép HTTPS): mọi request HTTP -> 301 sang HTTPS.
server {
    listen 80;
    server_name big-rag.dev www.big-rag.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name big-rag.dev www.big-rag.dev;

    # Cert Let's Encrypt thật cho big-rag.dev (certbot standalone trên VM, renew qua cron).
    # Dev không có domain: dùng nginx/app.conf này thì cần cert tại /etc/letsencrypt.
    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:5173;

    client_max_body_size 100m;   # upload PDF qua /api/documents

    # Basic Auth toàn site. File hash .htpasswd để NGOÀI git (secret), tạo tay trên VM:
    #   docker run --rm httpd:2-alpine htpasswd -nbm <user> '<pass>' > infra/nginx/.htpasswd
    # TẠM TẮT basic auth (bỏ comment 2 dòng dưới để bật lại).
    # auth_basic           "big-rag restricted";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # Health check của deploy.sh (curl nội bộ, không có credential) — miễn auth.
    location = /api/health {
        auth_basic off;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # API + Swagger về backend. FE gọi same-origin (VITE_API_BASE_URL rỗng) nên cùng
    # host/cổng với trang — hết mixed-content khi vào bằng https.
    location ~ ^/(api/|docs|openapi\.json|redoc) {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # /api/playground/query stream SSE (text/event-stream): không buffer, giữ kết
        # nối lâu (pipeline parse + LLM chạy dài).
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Slide deck tĩnh (pitch deck) tại big-rag.dev/slide — serve TRỰC TIẾP từ nginx,
    # KHÔNG proxy về frontend. File bind-mount từ repo (slides.html -> index.html, demo/),
    # xem ../docker-compose.yml. Đổi nội dung slide chỉ cần git pull, không rebuild nginx.
    # auth_basic off: giữ deck công khai (link chia sẻ) kể cả khi bật basic auth toàn site.
    location = /slide { return 301 /slide/; }
    location /slide/ {
        root /usr/share/nginx/html;
        index index.html;
        auth_basic off;
    }

    # Mọi thứ còn lại: frontend (Vite dev server). Upgrade header cho websocket HMR.
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ---------------------------------------------------------------------------
# Subdomain phụ trợ: đưa UI của các service infra ra ngoài qua reverse proxy.
#   neo4j.big-rag.dev  -> neo4j:7474  (Neo4j Browser)
#   mlflow.big-rag.dev -> mlflow:5000 (MLflow UI)
#   qdrant.big-rag.dev -> qdrant:6333 (Qdrant dashboard: /dashboard)
#   rustfs.big-rag.dev -> rustfs:9001 (RustFS Console)
# Tất cả dùng CHUNG cert big-rag.dev (đã --expand để phủ 4 subdomain này). big-rag.dev
# là HSTS-preload nên subdomain BẮT BUỘC chạy HTTPS -> mọi HTTP redirect 301 sang HTTPS.
# Resolve service name lúc runtime (resolver Docker DNS) để nginx start được kể cả khi
# service chưa sẵn sàng. KHÔNG có auth phụ: MLflow/Qdrant lộ công khai, ghi được.
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name neo4j.big-rag.dev mlflow.big-rag.dev qdrant.big-rag.dev rustfs.big-rag.dev;
    return 301 https://$host$request_uri;
}

# Neo4j Browser (UI tĩnh trên :7474). Lưu ý: khung query cần kết nối Bolt (:7687) qua
# websocket — trang HTTPS chặn ws:// không mã hoá, nên pane truy vấn có thể không connect
# được nếu chưa bật bolt+s. Bản thân UI vẫn load. Xem ghi chú deploy nếu cần Bolt qua proxy.
server {
    listen 443 ssl;
    server_name neo4j.big-rag.dev;
    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 100m;

    location / {
        set $neo4j_upstream http://neo4j:7474;
        proxy_pass $neo4j_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# MLflow UI. MLflow chặn Host lạ qua --allowed-hosts nên đã thêm mlflow.big-rag.dev vào
# danh sách đó (infra/docker-compose.yml); ở đây forward Host thật.
server {
    listen 443 ssl;
    server_name mlflow.big-rag.dev;
    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 500m;   # upload artifact có thể lớn

    # MLflow Assistant (AI helper) bị khoá CHỈ-localhost trong mã nguồn (bảo mật: nó cài
    # skill / chạy lệnh trên host). Qua domain nó trả 403 -> UI hiện banner "You do not have
    # permission" (ngay cả trên trang Datasets). Trả config RỖNG để tắt banner; các endpoint
    # assistant khác vẫn để MLflow tự 403 (đúng thiết kế). Muốn dùng assistant: SSH tunnel
    # localhost:5000. Phần còn lại của MLflow (datasets/traces/eval) chạy bình thường.
    location = /ajax-api/3.0/mlflow/assistant/config {
        default_type application/json;
        return 200 '{"providers":{},"projects":{}}';
    }

    location / {
        set $mlflow_upstream http://mlflow:5000;
        proxy_pass $mlflow_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# Qdrant: REST API ở /, dashboard ở /dashboard. KHÔNG có auth mặc định.
server {
    listen 443 ssl;
    server_name qdrant.big-rag.dev;
    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 100m;

    location / {
        set $qdrant_upstream http://qdrant:6333;
        proxy_pass $qdrant_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# RustFS Console (:9001). Console là SPA + websocket -> cần Upgrade header.
server {
    listen 443 ssl;
    server_name rustfs.big-rag.dev;
    ssl_certificate     /etc/letsencrypt/live/big-rag.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/big-rag.dev/privkey.pem;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 500m;

    # Console SPA của RustFS phục vụ ở /rustfs/console/ (root "/" trả 403 kiểu S3),
    # nên đưa người vào console luôn khi mở rustfs.big-rag.dev.
    location = / {
        return 302 /rustfs/console/;
    }

    location / {
        set $rustfs_upstream http://rustfs:9001;
        proxy_pass $rustfs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}
