# Cửa vào DUY NHẤT của app trên host: nginx 80/443 serve frontend + proxy /api về backend.
# Backend không publish :8000 ra host (xem ../docker-compose.yml của app).
#
# Cả frontend lẫn backend chạy ở stack app, nối vào network `rag-infra` — resolve service
# name lúc RUNTIME qua DNS nội bộ Docker (resolver + biến) để nginx vẫn start được khi
# stack app chưa up (infra up trước, theo thứ tự của `make up`).

# Chuẩn websocket: chỉ gửi "Connection: upgrade" khi client thật sự upgrade (HMR của Vite).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

server {
    listen 80;
    listen 443 ssl;
    server_name _;

    # Cert self-signed cho dev, sinh bởi service one-shot `nginx-certs` (volume nginx_certs).
    # Prod: thay bằng cert thật (mount đè /etc/nginx/certs).
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream  http://backend:8000;
    set $frontend_upstream http://frontend:5173;

    client_max_body_size 100m;   # upload PDF qua /api/documents

    # API + Swagger về backend. FE gọi same-origin (VITE_API_BASE_URL rỗng) nên cùng
    # host/cổng với trang — hết mixed-content khi vào bằng https.
    location ~ ^/(api/|docs|openapi\.json|redoc) {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # /api/playground/query stream SSE (text/event-stream): không buffer, giữ kết
        # nối lâu (pipeline parse + LLM chạy dài).
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Mọi thứ còn lại: frontend (Vite dev server). Upgrade header cho websocket HMR.
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
