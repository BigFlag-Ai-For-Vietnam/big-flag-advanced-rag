# Infra stack: Qdrant (vector DB) + Neo4j (knowledge graph) + MLflow tracking
#              + RustFS (S3-compatible artifact store) + Postgres (backend store)
#              + nginx (80/443: serve frontend + proxy /api -> backend)
# Usage:
#   cd infra && cp .env.example .env   # điền secrets
#   docker compose up --build
#
# App (qua nginx):  http://localhost (80) / https://localhost (443, self-signed) — /docs = Swagger
# Qdrant:           http://localhost:6333 (dashboard: /dashboard)
# Neo4j Browser:    http://localhost:7474 (bolt: localhost:7687)
# MLflow UI:        http://localhost:5000
# RustFS S3 API:    http://localhost:9000
# RustFS Console:   http://localhost:9001
# Postgres:         localhost:5432
#
# Network "rag-infra" là attachable: app compose (../docker-compose.yml) nối backend
# vào đây để gọi qdrant/mlflow/rustfs theo service name.

services:
  # Cửa vào duy nhất của app: 80/443 serve frontend + proxy /api về backend (cả 2 ở
  # stack app, không publish port riêng). Resolve qua DNS runtime (xem nginx/app.conf)
  # nên nginx up được trước cả stack app.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
      # Cert Let's Encrypt thật cho big-rag.dev (sinh bằng certbot standalone trên VM,
      # renew qua cron). live/ chứa symlink vào archive/ nên phải mount cả cây thư mục.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Basic Auth: file hash .htpasswd để NGOÀI git (secret), tạo tay trên VM (xem
      # nginx/app.conf). Phải tồn tại trước khi nginx up, nếu không Docker tạo thư mục.
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      nginx-certs:
        condition: service_completed_successfully

  # One-shot: sinh cert self-signed cho 443 (dev) nếu chưa có rồi thoát.
  nginx-certs:
    image: alpine/openssl:latest
    entrypoint: >
      /bin/sh -c "
      [ -f /certs/server.crt ] && exit 0;
      openssl req -x509 -nodes -newkey rsa:2048 -days 365
      -keyout /certs/server.key -out /certs/server.crt -subj '/CN=localhost';
      echo 'Self-signed cert ready';
      "
    volumes:
      - nginx_certs:/certs

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Knowledge Graph (app/services/kg/ ingest-time build + app/services/graph_service.py
  # query-time đọc) — cùng network attachable "rag-infra" nên app stack (backend +
  # retrieval-mcp) resolve được theo service name "neo4j" (xem NEO4J_URI ở docker-compose.yml gốc).
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-changeme123}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_OBS_LOGGER_LEVEL: info
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # One-shot: tạo bucket cho MLflow artifacts rồi thoát.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs:9000 ${RUSTFS_ACCESS_KEY:-rustfsadmin} ${RUSTFS_SECRET_KEY:-rustfsadmin};
      mc mb --ignore-existing rustfs/${MLFLOW_BUCKET:-mlflow};
      echo 'Bucket ${MLFLOW_BUCKET:-mlflow} ready';
      exit 0;
      "

  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    restart: unless-stopped
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      # MLflow dùng các biến AWS_* + endpoint để nói chuyện với RustFS qua S3 protocol.
      MLFLOW_S3_ENDPOINT_URL: http://rustfs:9000
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      # boto3 cần region dù RustFS bỏ qua; đặt để tránh warning.
      AWS_DEFAULT_REGION: us-east-1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --artifacts-destination s3://${MLFLOW_BUCKET:-mlflow}
      --serve-artifacts
      --allowed-hosts "localhost,localhost:*,127.0.0.1,127.0.0.1:*,mlflow,mlflow:*,mlflow.big-rag.dev,mlflow.big-rag.dev:*,host.docker.internal,host.docker.internal:*"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

networks:
  # Tên cố định + attachable để compose app (project khác) nối vào được.
  default:
    name: rag-infra
    attachable: true

volumes:
  qdrant_data:
  postgres_data:
  rustfs_data:
  nginx_certs:
  neo4j_data:
